<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống đang bảo trì - v1.2.7.20260309062908</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f5f5f5;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .countdown {
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            border-left-color: #007bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Hệ thống đang bảo trì</h1>
        <p>Vui lòng quay lại sau 5 phút. Chúng tôi đang thực hiện cập nhật để mang lại trải nghiệm tốt hơn.</p>
        <div class="spinner"></div>
        <div class="countdown" id="countdown">5:00</div>
    </div>

    <script>
        // Countdown timer
        let timeLeft = 5 * 60; // 5 minutes in seconds
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            countdownElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            timeLeft--;
            
            if (timeLeft < 0) {
                clearInterval(timer);
                countdownElement.textContent = "00:00";
                // Optionally redirect to homepage after countdown
                // window.location.href = '/';
            }
        }, 1000);
    </script>
</body>
</html>
